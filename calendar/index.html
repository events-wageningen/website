</footer>  </body></html>  <script>(function(){const eventsData = [{"id":"congo-fundraiser-2026","name":"Congo Fundraiser","slug":"congo-fundraiser-2026","description":"Join for screening of \"This is Congo\". Art, prints on sale. Dinner also possible.","startDate":"2026-04-19T16:30:00+00:00","endDate":"2026-04-19T20:00:00+00:00","location":{"name":"NuDe Toekomst","city":"Wageningen"},"category":["movies","food","art"],"tags":["nude","congo","fundraising"],"url":"","price":"donation","status":"scheduled","creatorTelegramId":50375278},{"id":"open-meeting-to-discuss-transfeminism-2026","name":"open meeting to discuss TRANSFEMINISM","slug":"open-meeting-to-discuss-transfeminism-2026","description":"Join our open meeting to discuss possibilities and strategies on how to get/stay active in a small and international town!","startDate":"2026-04-22T18:30:00+00:00","endDate":"2026-04-22T21:00:00+00:00","location":{"name":"Clockhouse","city":"Wageningen"},"category":["politics","talks"],"tags":["transfeminism","clockhouse"],"url":"","price":"free","status":"scheduled","lat":51.967496,"lon":5.675584,"creatorTelegramId":50375278},{"id":"singing-circle-2026","name":"Singing Circle","slug":"singing-circle-2026","description":"Good afternoon Family ☀️ \nOn this beautiful day sharing the invitation to our Singing Circle, next week, Wednesday the 29th of April 18.00 - 21.00h.\n\nNext week all of Holland will celebrate the King's birthday. Monday (Kingsday) Healing Hands Wageningen will be open with a little local store, and short introduction massages. \nLocal Jewelery/ Healthy Homemade foods and drinks and a Hand Pan Sound Healing Session starting at around 17.00h. You're Welcome to come by and share some good vibes!\n\nWednesday we'll organize a singing circle in the theme of Kings and Queens in our lives. In honor of our Fathers and Mothers, Singing songs for our loved ones, family & ancestors.\n\nThis is an open singing circle with the invitation to bring your own instruments and share any songs that you really like to sing. \nThe idea is to simply enjoy the moment of singing together and sharing a beautiful space. If you don't feel very comfortable singing, you're also very welcome to just be present and listen 🙏🏼\n\nWelcome to share this invitation with friends & loved ones and you can come and go whenever you like. \n\nSliding scale for the donation for this event is €5 - €15\n\nHave a beautiful day\nBlessings\n❤️💛💚","startDate":"2026-04-29T18:00:00+00:00","endDate":"2026-04-29T21:00:00+00:00","location":{"name":"Healing Hands","city":"Wageningen"},"category":["workshops","yoga","music"],"tags":[],"url":"https://www.healinghandswageningen.nl/","price":"donation","status":"scheduled","lat":51.992205,"lon":5.676064,"creatorTelegramId":883208832},{"id":"postpsychfest-2026","name":"PostPsychFest","slug":"postpsychfest-2026","description":"After a wildly rocking first edition, Postpsychfest returns. Louder & wilder.. get ready for Postpsychfest II !!\nThe night will begin in a haze; slow and dreamlike. But don’t get too comfortable ‘gazing at your shoes’! You’ll soon be pulled into a storm of polyrhythms, swirling noise, and psychedelic rock chaos.","startDate":"2026-04-29T20:00:00+00:00","endDate":"2026-04-30T00:00:00+00:00","location":{"name":"Junushoff","city":"Wageningen"},"category":["music"],"tags":["music","live","bands","psychedelic","rock"],"url":"https://popupop.nl/event/postpsychfest-2","price":"paid","status":"scheduled","lat":51.966884,"lon":5.661505,"creatorTelegramId":1186580139},{"id":"workshop-police-abolition-and-community-safety-beyond-policing-2026","name":"Workshop: Police Abolition and Community Safety Beyond Policing","slug":"workshop-police-abolition-and-community-safety-beyond-policing-2026","description":"Join us for an open community workshop exploring what safety and justice can look like beyond policing. Together we'll move through how we understand police and policing in our different contexts, what safety and justice mean to us and to the communities around us, and what alternatives might look like in practice. Through discussion and group problem-solving, we'll work through the kinds of conversations many of us are already having, or need to start having, in our communities. Come as you are, bring your questions, and be ready to think together.","startDate":"2026-04-30T18:00:00+00:00","endDate":"2026-04-30T21:00:00+00:00","location":{"name":"The Old Library at the Clockhouse (37 General Foulkesweg)","city":"Wageningen"},"category":["workshops","talks","politics"],"tags":["workshop","police","politics","social","justice","police","abolition","safety","liberation"],"url":"https://www.otherwisewageningen.org/#:~:text=Workshop%3A%20Police%20Abolition%20and%20Community%20Safety%20Beyond%20Policing","price":"free","status":"scheduled","creatorTelegramId":1186580139},{"id":"rondleiding-de-geheimen-van-rododendrons-door-collectiebeheerder-theo-damen-2026","name":"Rondleiding ‘De geheimen van rododendrons’ door collectiebeheerder Theo Damen","slug":"rondleiding-de-geheimen-van-rododendrons-door-collectiebeheerder-theo-damen-2026","description":"Op zaterdag 2 mei is er een rondleiding door het Belmonte Arboretum onder leiding van onze collectiebeheerder Theo Damen. Het thema van de wandeling: De geheimen van rodododendrons.\n\nTheo vertelt u tijdens deze wandeling van alles over de tuin, het beheer en vooral onze bijzondere collectie rododendrons, die in april en mei volop in bloei staan.\n\nWilt u mee? Dat kan. We beginnen om 10:00 bij het Koetshuis in Belmonte Arboretum.\n\nDe rondleiding is gratis voor onze donateurs.\nGeen donateur? Dan kunt u 7,50 € pp overmaken via deze link. Zet u er even bij: ‘rododendronwandeling 2 mei’.","startDate":"2026-05-02T10:00:00+00:00","endDate":"2026-05-02T11:30:00+00:00","location":{"name":"Belmonte Arboretum","city":"Wageningen"},"category":["nature","talks"],"tags":["flowers","botany","arboretum","plants"],"url":"https://belmontearboretum.nl/agenda/rondleiding-de-geheimen-van-rododendrons-door-collectiebeheerder-theo-damen/","price":"donation","status":"scheduled","lat":51.966409,"lon":5.688911,"creatorTelegramId":1186580139},{"id":"freedom-through-the-lenses-of-gender-and-sexuality-2026","name":"Freedom through the lenses of gender and sexuality","slug":"freedom-through-the-lenses-of-gender-and-sexuality-2026","description":"Freedom Tours Wageningen offers a fresh and deeply personal exploration of freedom and its connection to gender and sexuality in the City of Liberation. During this two-hour interactive tour in downtown Wageningen, tour participants walk with local guides and explore freedom through the lenses of gender and sexuality. Each stop along the tour offers an opportunity for dialogue and reflection, not just observation. Guides share personal stories and invite participants to do the same, creating a space for open conversation and connection across differences.\n\nThis new responsible tourism initiative invites both residents and visitors to see Wageningen through new eyes. Unlike traditional tours, Freedom Tours Wageningen has been co-created by local residents over the course of several months as they learned from each other and from their communities. Together, they developed an interactive route that reflects the lived experiences, social concerns, and hopes of the people who call this city home.\n\nFree monthly tours will be offered from September 2025 to June 2026. This tour (in English) is free, but registration is required. Sign up via the link: freedomtourswageningen.nl\nAfter registration the start location will be shared with you.","startDate":"2026-05-02T10:30:00+00:00","endDate":"2026-05-02T12:30:00+00:00","location":{"name":"Downtown Wageningen","city":"Wageningen"},"category":["talks","politics"],"tags":["gender","sexuality","freedom","tour","dialogue"],"url":"https://www.freedomtourswageningen.nl/","price":"free","status":"scheduled","creatorTelegramId":1186580139},{"id":"klankbad-in-een-hangmat-adempauze-2026","name":"Klankbad in een hangmat 🌀 Adempauze","slug":"klankbad-in-een-hangmat-adempauze-2026","description":"Met 10 euro lentekriebel korting!🌱\n\nVeel aanstaan en doorgaan.\nNog even dit en nog even dat… Zo herkenbaar he.\n\nTijdens dit klankbad stap je letterlijk even uit de drukte. Je mag liggen in een hangmat terwijl rustgevende klanken je helpen om te ontspannen.\n\nDe combinatie van het lichte schommelen van de hangmat en de klanken van o.a. klankschalen, handpan, drum en fluit brengen jou lichaam tot rust en geeft je hoofd weer ruimte. Een moment voor jezelf om op adem te komen.\n\nZorgvuldig op elkaar aangepaste etherische oliën en mijn warme stem vullen naast de klanken deze bijzondere sessie.\n\nMet een kopje thee en voedende versnapering zullen we samen deze bijzondere middag afsluiten.\n\nDichter bij jezelf, meer in balans en met een glimlach op je gezicht de nieuwe week in 😊\n\nEr is plek voor 14 personen en de kosten voor deze bijzondere klankbeleving zijn normaal euro maar met de lentekriebel korting maar 50 euro per persoon.","startDate":"2026-05-03T14:00:00+00:00","endDate":"2026-05-03T16:00:00+00:00","location":{"name":"Het Yogaschooltje","city":"Wageningen"},"category":["yoga","meditation","music"],"tags":["meditation","sound","bath","hammock"],"url":"https://hipsy.nl/event/200900-klankbad-in-een-hangmat-adempauze","price":"paid","status":"scheduled","lat":51.965614,"lon":5.661818,"creatorTelegramId":1186580139},{"id":"shuteen-erdenebaatar-quartet-jazz-concert-2026","name":"Shuteen Erdenebaatar Quartet Jazz Concert","slug":"shuteen-erdenebaatar-quartet-jazz-concert-2026","description":"Rising star artist of the year\n\nShuteen Erdenebaatar, een groot jazztalent wereldwijd\n\nDe in 1998 in de Mongoolse hoofdstad Ulaanbaatar geboren Erdenebaatar is een van de sensaties van haar generatie! Na haar klassieke studie in Mongolië bracht haar liefde voor jazz haar naar Duitsland. Hier studeerde ze jazzpiano en jazzcomposer. Al snel, en dat is best bijzonder voor pianisten, ontwikkelde ze haar eigen stem. Deze stem vormt een uniek geluid met haar verlangende melodieën, verrijkt met diepe en expressieve harmonieën en ritmes. Haar klassieke basis is overal onmiskenbaar aanwezig, wat duidelijk blijkt uit haar technische briljantie, stilistische finesse en de thematische structuur van haar composities.\n\nNa haar debuutalbum 'Rising Sun', dat in september 2023 uitkwam op het gerenommeerde label Motéma Music uit New York, werd ze al snel erkend en gevierd als een van de meest veelbelovende rijzende sterren van de Europese en wereldwijde jazzscene. Dit album met haar kwartet zorgde voor een golf van sensatie in de pers en bij het publiek! Hoe blij zijn we dan ook dat we haar bij Jazz in Wageningen mogen begroeten!","startDate":"2026-05-03T20:30:00+00:00","endDate":"2026-05-03T22:00:00+00:00","location":{"name":"Junushoff Theater","city":"Wageningen"},"category":["music"],"tags":["jazz","concert","music","quartet"],"url":"https://www.junushoff.nl/programma/shuteen-erdenebaatar-quartet-8wjr#260977","price":"paid","status":"scheduled","lat":51.966884,"lon":5.661505,"creatorTelegramId":1186580139},{"id":"kick-off-event-for-critical-alternative-research-methods-course-2026","name":"Kick-off event for Critical Alternative Research Methods Course","slug":"kick-off-event-for-critical-alternative-research-methods-course-2026","description":"How does the question shape the answer? How to make sense of erased, obscured or silenced data? In this event, we invite a panel of journalists and Intelligence Studies scholars to explore the distinct, but often intersecting, paths of the journalist and the academic investigation in quest of social justice. In his remarkable piece of work, the documentary \"Why Srebrenica had to fall”, journalist Huub Jaspers exposes the hidden political failures underlying Bosnia mass atrocities of the 1990s. The public will be invited to compare, contrast, and critique different ways of apprehending thorny questions from various methodological perspectives. The event is an opportunity to discuss how to achieve criticality in qualitative research, beyond dominant and oppressive historical narratives.","startDate":"2026-05-13T11:00:00+00:00","endDate":"2026-05-13T14:00:00+00:00","location":{"name":"Impulse, Speaker Corner, Stippeneng 2, Wageningen","city":"Wageningen"},"category":["politics","talks"],"tags":["politics","symposium","documentary","social","justice","bosnia","srebrenica"],"url":"https://www.otherwisewageningen.org/#:~:text=Kick%2Doff%20event%20for%20Critical%20Alternative%20Research%20Methods%20Course","price":"free","status":"scheduled","lat":51.984052,"lon":5.661678,"creatorTelegramId":1186580139},{"id":"quiet-is-the-new-loud-2026","name":"Quiet is the New Loud!","slug":"quiet-is-the-new-loud-2026","description":"A fresh edition of Quiet is the New Loud! Doors open at 07:45 PM, start at 8.00 PM.\nQuiet is the new loud! an evening from Popculture Wageningen in De Cultuurwerkplaats with your favorite tunes.","startDate":"2026-05-13T20:00:00+00:00","endDate":"2026-05-13T22:00:00+00:00","location":{"name":"De bblthk","city":"Wageningen"},"category":["music"],"tags":["music","concert","live","music"],"url":"https://bblthk.op-shop.nl/4717/quiet-is-the-new-loud/13-05-2026","price":"free","status":"scheduled","lat":51.967579,"lon":5.665799,"creatorTelegramId":1186580139},{"id":"digital-independence-and-you-2026","name":"Digital Independence and You","slug":"digital-independence-and-you-2026","description":"Digital Independence \nA workshop to empower YOU, the computer user!\n\nAre you a computer user? Do you feel powerless towards your computer sometimes? Have you experienced being afraid of Windows updating during an exam? Or having to buy a new computer because Windows or macOS does not support your old computer anymore, even though it works perfectly fine? Do you want to become (a bit) independent of American Big Tech? Have you ever considered that you can change these tools to make them fit your needs, your device, and the world?\nIf you are silently thinking, “Oh, but I am not a computer nerd”; I don’t know anything about computers, this is the workshop for you!\n\nThe program:\n  - basic terms and what an operating system does\n  - the differences in major operating systems\n  - open-source and free software\n  - software use from a political perspective and sustainable software\n  - how to change your operating system and try out the alternatives\n\nWhat to bring: We will try out stuff in the workshop, so if  you have the possibility, bring a laptop and some empty storage media (for example, an USB stick: 4 GB is good, 8 GB is even better, and more is no problem :)).\n\nP. S.: If you are a computer nerd you are of course also welcome, but we will probably cover knowledge you already have :)","startDate":"2026-05-20T17:30:00+00:00","endDate":"2026-05-20T19:30:00+00:00","location":{"name":"Old Library, The Clockhouse","city":"Wageningen"},"category":["workshops","politics"],"tags":["workshop","computers"],"url":"https://www.otherwisewageningen.org/#:~:text=Digital%20Independence%20and%20You","price":"free","status":"scheduled","creatorTelegramId":50375278},{"id":"wageningse-goede-moed-2026","name":"Wageningse Goede Moed","slug":"wageningse-goede-moed-2026","description":"Op donderdag 21 mei gaan weer heel veel Wageningers bij elkaar eten. Een mooie gelegenheid om je onbekende stadsgenoten te ontmoeten.\n\nNa afloop verzamelen we in de Grote Kerk voor een toetje, een Goede-Moed-Show en een Goede-Moed-Borrel. Je bent van harte uitgenodigd om mee te eten. En als je wilt, kun je ook thuis voor andere Wageningers koken.\n\nJe kunt je opgeven op www.wageningsegoedemoed.nl . Het is gratis, maar als je wilt kun je een bijdrage doneren zodat we meer Goede Moed kunnen organiseren.\n\nOngeveer een week van tevoren hoor je bij wie je kunt eten of voor wie je kunt koken als je je aanmeldt als atorTelegramId":1186580139}];
const siteBaseUrl = "/";

  let year  = new Date().getFullYear();
  let month = new Date().getMonth(); // 0-indexed

  const MONTH_NAMES = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
  ];

  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderCalendar() {
    document.getElementById('month-title').textContent = `${MONTH_NAMES[month]} ${year}`;

    // First weekday of month (Mon-first: 0=Mon, 6=Sun)
    const firstDayRaw   = new Date(year, month, 1).getDay(); // 0=Sun
    const startOffset   = (firstDayRaw + 6) % 7;
    const daysInMonth   = new Date(year, month + 1, 0).getDate();
    const today         = new Date();

    // Gather events for this month
    const monthEvents = eventsData.filter((ev) => {
      const d = new Date(ev.startDate);
      return d.getFullYear() === year && d.getMonth() === month;
    });

    // Group by day-of-month
    const byDay = {};
    monthEvents.forEach((ev) => {
      const d = new Date(ev.startDate).getDate();
      if (!byDay[d]) byDay[d] = [];
      byDay[d].push(ev);
    });

    let html = '';

    // Empty leading cells
    for (let i = 0; i < startOffset; i++) {
      html += '<div class="cal-cell is-empty"></div>';
    }

    // Day cells
    const todayY = today.getFullYear();
    const todayM = today.getMonth();
    const todayD = today.getDate();

    for (let d = 1; d <= daysInMonth; d++) {
      const isToday = todayY === year && todayM === month && todayD === d;
      const isPast  = new Date(year, month, d) < new Date(todayY, todayM, todayD);
      const dayEvs  = byDay[d] || [];

      const classes = [
        'cal-cell',
        isToday ? 'is-today' : '',
        isPast  ? 'is-past'  : '',
      ].filter(Boolean).join(' ');

      // Day number header
      const dayHeader = `<div class=\"cal-day-header\"><span class=\"cal-day-num\">${d}</span></div>`;

      // Event dot-list items (max 5, then "+N more")
      const MAX_VISIBLE = 5;
      const visible = dayEvs.slice(0, MAX_VISIBLE);
      const extra   = dayEvs.length - MAX_VISIBLE;

      const items = visible.map((ev) =>
        `<li class=\"cal-event-item\">` +
        `<span class=\"cal-dot\"></span>` +
        `<a href=\"${siteBaseUrl}events/${escHtml(ev.slug)}/\" class=\"cal-event-link\" title=\"${escHtml(ev.name)}\">${escHtml(ev.name)}</a>` +
        `</li>`
      ).join('');

      const moreRow = extra > 0
        ? `<li class=\"cal-more\">+${extra} more</li>`
        : '';

      const list = (items || moreRow)
        ? `<ul class=\"cal-event-list\">${items}${moreRow}</ul>`
        : '';

      html += `<div class=\"${classes}\">${dayHeader}${list}</div>`;
    }

    document.getElementById('calendar-cells').innerHTML = html;
  }

  document.getElementById('prev-month').addEventListener('click', () => {
    month--;
    if (month < 0) { month = 11; year--; }
    renderCalendar();
  });

  document.getElementById('next-month').addEventListener('click', () => {
    month++;
    if (month > 11) { month = 0; year++; }
    renderCalendar();
  });

  renderCalendar();
})();</script>
