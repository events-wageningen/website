</footer>  </body></html>  <script>(function(){const eventsData = [{"id":"congo-fundraiser-2026","name":"Congo Fundraiser","slug":"congo-fundraiser-2026","description":"Join for screening of \"This is Congo\". Art, prints on sale. Dinner also possible.","startDate":"2026-04-19T16:30:00+00:00","endDate":"2026-04-19T20:00:00+00:00","location":{"name":"NuDe Toekomst","city":"Wageningen"},"category":["movies","food","art"],"tags":["nude","congo","fundraising"],"url":"","price":"donation","status":"scheduled","creatorTelegramId":50375278},{"id":"open-meeting-to-discuss-transfeminism-2026","name":"open meeting to discuss TRANSFEMINISM","slug":"open-meeting-to-discuss-transfeminism-2026","description":"Join our open meeting to discuss possibilities and strategies on how to get/stay active in a small and international town!","startDate":"2026-04-22T18:30:00+00:00","endDate":"2026-04-22T21:00:00+00:00","location":{"name":"Clockhouse","city":"Wageningen"},"category":["politics","talks"],"tags":["transfeminism","clockhouse"],"url":"","price":"free","status":"scheduled","lat":51.967496,"lon":5.675584,"creatorTelegramId":50375278},{"id":"singing-circle-2026","name":"Singing Circle","slug":"singing-circle-2026","description":"Good afternoon Family ☀️ \nOn this beautiful day sharing the invitation to our Singing Circle, next week, Wednesday the 29th of April 18.00 - 21.00h.\n\nNext week all of Holland will celebrate the King's birthday. Monday (Kingsday) Healing Hands Wageningen will be open with a little local store, and short introduction massages. \nLocal Jewelery/ Healthy Homemade foods and drinks and a Hand Pan Sound Healing Session starting at around 17.00h. You're Welcome to come by and share some good vibes!\n\nWednesday we'll organize a singing circle in the theme of Kings and Queens in our lives. In honor of our Fathers and Mothers, Singing songs for our loved ones, family & ancestors.\n\nThis is an open singing circle with the invitation to bring your own instruments and share any songs that you really like to sing. \nThe idea is to simply enjoy the moment of singing together and sharing a beautiful space. If you don't feel very comfortable singing, you're also very welcome to just be present and listen 🙏🏼\n\nWelcome to share this invitation with friends & loved ones and you can come and go whenever you like. \n\nSliding scale for the donation for this event is €5 - €15\n\nHave a beautiful day\nBlessings\n❤️💛💚","startDate":"2026-04-29T18:00:00+00:00","endDate":"2026-04-29T21:00:00+00:00","location":{"name":"Healing Hands","city":"Wageningen"},"category":["workshops","yoga","music"],"tags":[],"url":"https://www.healinghandswageningen.nl/","price":"donation","status":"scheduled","lat":51.992205,"lon":5.676064,"creatorTelegramId":883208832},{"id":"postpsychfest-2026","name":"PostPsychFest","slug":"postpsychfest-2026","description":"After a wildly rocking first edition, Postpsychfest returns. Louder & wilder.. get ready for Postpsychfest II !!\nThe night will begin in a haze; slow and dreamlike. But don’t get too comfortable ‘gazing at your shoes’! You’ll soon be pulled into a storm of polyrhythms, swirling noise, and psychedelic rock chaos.","startDate":"2026-04-29T20:00:00+00:00","endDate":"2026-04-30T00:00:00+00:00","location":{"name":"Junushoff","city":"Wageningen"},"category":["music"],"tags":["music","live","bands","psychedelic","rock"],"url":"https://popupop.nl/event/postpsychfest-2","price":"paid","status":"scheduled","lat":51.966884,"lon":5.661505,"creatorTelegramId":1186580139},{"id":"workshop-police-abolition-and-community-safety-beyond-policing-2026","name":"Workshop: Police Abolition and Community Safety Beyond Policing","slug":"workshop-police-abolition-and-community-safety-beyond-policing-2026","description":"Join us for an open community workshop exploring what safety and justice can look like beyond policing. Together we'll move through how we understand police and policing in our different contexts, what safety and justice mean to us and to the communities around us, and what alternatives might look like in practice. Through discussion and group problem-solving, we'll work through the kinds of conversations many of us are already having, or need to start having, in our communities. Come as you are, bring your questions, and be ready to think together.","startDate":"2026-04-30T18:00:00+00:00","endDate":"2026-04-30T21:00:00+00:00","location":{"name":"The Old Library at the Clockhouse (37 General Foulkesweg)","city":"Wageningen"},"category":["workshops","talks","politics"],"tags":["workshop","police","politics","social","justice","police","abolition","safety","liberation"],"url":"https://www.otherwisewageningen.org/#:~:text=Workshop%3A%20Police%20Abolition%20and%20Community%20Safety%20Beyond%20Policing","price":"free","status":"scheduled","creatorTelegramId":1186580139},{"id":"expositie-becoming-siraya-dutch-colonial-history-in-taiwan-2026","name":"Expositie: Becoming Siraya: Dutch colonial history in Taiwan","slug":"expositie-becoming-siraya-dutch-colonial-history-in-taiwan-2026","description":"Becoming Siraya: How Dutch Colonial History Interacts with the Past and Present Indigenous Taiwan.\n\nFour hundred years ago, ships from the Netherlands arrived at the island of Taiwan in a place called Tayouan. This was the home of the Sinkang (Sinckan) people, part of a vibrant network of communities on the Southwest plain that we now call Siraya.\n\nThey were the Indigenous group who had the most interactions with the Dutch, and the impacts of these colonial encounters still ripple today. Becoming Siraya is a joint exhibition and choir performance program organised by the Tainan Siraya Culture Association and Er-Wen Yang (founder of Rootedhubs).\n\nTogether, we want to tell stories about Dutch colonial history in Taiwan and emphasizes how the past connects to our present, especially to indigenous language revitalization and name rectification.","startDate":"2026-05-01T10:00:00+00:00","endDate":"2026-06-01T18:00:00+00:00","location":{"name":"De bblthk - bibliotheek Wageningen","city":"Wageningen"},"category":["art"],"tags":["art","exhibition","history","taiwan","colonialism"],"url":"https://bblthk.op-shop.nl/5378/expositie-becoming-siraya-dutch-colonial-history-in-taiwan/01-05-2026","price":"free","status":"scheduled","lat":51.967581,"lon":5.665759,"creatorTelegramId":1186580139},{"id":"party-on-the-move-1st-of-may-2026","name":"Party on the Move 1st of May","slug":"party-on-the-move-1st-of-may-2026","description":"On Friday, May 1st, we'll start the party at Torckpark in Wageningen around 19.00, and then see where the night brings us. We'll have drinks but feel free to also bring your own! 🪩🎶\n\nWe will share our live location so that you cannot miss the party 🗺🔍","startDate":"2026-05-01T19:00:00+00:00","endDate":"2026-05-02T02:00:00+00:00","location":{"name":"All across Wageningen","city":"Wageningen"},"category":["dance","music","food"],"tags":["party","sister"],"url":"","price":"free","status":"scheduled","creatorTelegramId":1186580139},{"id":"rondleiding-de-geheimen-van-rododendrons-door-collectiebeheerder-theo-damen-2026","name":"Rondleiding ‘De geheimen van rododendrons’ door collectiebeheerder Theo Damen","slug":"rondleiding-de-geheimen-van-rododendrons-door-collectiebeheerder-theo-damen-2026","description":"Op zaterdag 2 mei is er een rondleiding door het Belmonte Arboretum onder leiding van onze collectiebeheerder Theo Damen. Het thema van de wandeling: De geheimen van rodododendrons.\n\nTheo vertelt u tijdens deze wandeling van alles over de tuin, het beheer en vooral onze bijzondere collectie rododendrons, die in april en mei volop in bloei staan.\n\nWilt u mee? Dat kan. We beginnen om 10:00 bij het Koetshuis in Belmonte Arboretum.\n\nDe rondleiding is gratis voor onze donateurs.\nGeen donateur? Dan kunt u 7,50 € pp overmaken via deze link. Zet u er even bij: ‘rododendronwandeling 2 mei’.","startDate":"2026-05-02T10:00:00+00:00","endDate":"2026-05-02T11:30:00+00:00","location":{"name":"Belmonte Arboretum","city":"Wageningen"},"category":["nature","talks"],"tags":["flowers","botany","arboretum","plants"],"url":"https://belmontearboretum.nl/agenda/rondleiding-de-geheimen-van-rododendrons-door-collectiebeheerder-theo-damen/","price":"donation","status":"scheduled","lat":51.966409,"lon":5.688911,"creatorTelegramId":1186580139},{"id":"freedom-through-the-lenses-of-gender-and-sexuality-2026","name":"Freedom through the lenses of gender and sexuality","slug":"freedom-through-the-lenses-of-gender-and-sexuality-2026","description":"Freedom Tours Wageningen offers a fresh and deeply personal exploration of freedom and its connection to gender and sexuality in the City of Liberation. During this two-hour interactive tour in downtown Wageningen, tour participants walk with local guides and explore freedom through the lenses of gender and sexuality. Each stop along the tour offers an opportunity for dialogue and reflection, not just observation. Guides share personal stories and invite participants to do the same, creating a space for open conversation and connection across differences.\n\nThis new responsible tourism initiative invites both residents and visitors to see Wageningen through new eyes. Unlike traditional tours, Freedom Tours Wageningen has been co-created by local residents over the course of several months as they learned from each other and from their communities. Together, they developed an interactive route that reflects the lived experiences, social concerns, and hopes of the people who call this city home.\n\nFree monthly tours will be offered from September 2025 to June 2026. This tour (in English) is free, but registration is required. Sign up via the link: freedomtourswageningen.nl\nAfter registration the start location will be shared with you.","startDate":"2026-05-02T10:30:00+00:00","endDate":"2026-05-02T12:30:00+00:00","location":{"name":"Downtown Wageningen","city":"Wageningen"},"category":["talks","politics"],"tags":["gender","sexuality","freedom","tour","dialogue"],"url":"https://www.freedomtourswageningen.nl/","price":"free","status":"scheduled","creatorTelegramId":1186580139},{"id":"klankbad-in-een-hangmat-adempauze-2026","name":"Klankbad in een hangmat 🌀 Adempauze","slug":"klankbad-in-een-hangmat-adempauze-2026","description":"Met 10 euro lentekriebel korting!🌱\n\nVeel aanstaan en doorgaan.\nNog even dit en nog even dat… Zo herkenbaar he.\n\nTijdens dit klankbad stap je letterlijk even uit de drukte. Je mag liggen in een hangmat terwijl rustgevende klanken je helpen om te ontspannen.\n\nDe combinatie van het lichte schommelen van de hangmat en de klanken van o.a. klankschalen, handpan, drum en fluit brengen jou lichaam tot rust en geeft je hoofd weer ruimte. Een moment voor jezelf om op adem te komen.\n\nZorgvuldig op elkaar aangepaste etherische oliën en mijn warme stem vullen naast de klanken deze bijzondere sessie.\n\nMet een kopje thee en voedende versnapering zullen we samen deze bijzondere middag afsluiten.\n\nDichter bij jezelf, meer in balans en met een glimlach op je gezicht de nieuwe week in 😊\n\nEr is plek voor 14 personen en de kosten voor deze bijzondere klankbeleving zijn normaal euro maar met de lentekriebel korting maar 50 euro per persoon.","startDate":"2026-05-03T14:00:00+00:00","endDate":"2026-05-03T16:00:00+00:00","location":{"name":"Het Yogaschooltje","city":"Wageningen"},"category":["yoga","meditation","music"],"tags":["meditation","sound","bath","hammock"],"url":"https://hipsy.nl/event/200900-klankbad-in-een-hangmat-adempauze","price":"paid","status":"scheduled","lat":51.965614,"lon":5.661818,"creatorTelegramId":1186580139},{"id":"shuteen-erdenebaatar-quartet-jazz-concert-2026","name":"Shuteen Erdenebaatar Quartet Jazz Concert","slug":"shuteen-erdenebaatar-quartet-jazz-concert-2026","description":"Rising star artist of the year\n\nShuteen Erdenebaatar, een groot jazztalent wereldwijd\n\nDe in 1998 in de Mongoolse hoofdstad Ulaanbaatar geboren Erdenebaatar is een van de sensaties van haar generatie! Na haar klassieke studie in Mongolië bracht haar liefde voor jazz haar naar Duitsland. Hier studeerde ze jazzpiano en jazzcomposer. Al snel, en dat is best bijzonder voor pianisten, ontwikkelde ze haar eigen stem. Deze stem vormt een uniek geluid met haar verlangende melodieën, verrijkt met diepe en expressieve harmonieën en ritmes. Haar klassieke basis is overal onmiskenbaar aanwezig, wat duidelijk blijkt uit haar technische briljantie, stilistische finesse en de thematische structuur van haar composities.\n\nNa haar debuutalbum 'Rising Sun', dat in september 2023 uitkwam op het gerenommeerde label Motéma Music uit New York, werd ze al snel erkend en gevierd als een van de meest veelbelovende rijzende sterren van de Europese en wereldwijde jazzscene. Dit album met haar kwartet zorgde voor een golf van sensatie in de pers en bij het publiek! Hoe blij zijn we dan ook dat we haar bij Jazz in Wageningen mogen begroeten!","startDate":"2026-05-03T20:30:00+00:00","endDate":"2026-05-03T22:00:00+00:00","location":{"name":"Junushoff Theater","city":"Wageningen"},"category":["music"],"tags":["jazz","concert","music","quartet"],"url":"https://www.junushoff.nl/programma/shuteen-erdenebaatar-quartet-8wjr#260977","price":"paid","status":"scheduled","lat":51.966884,"lon":5.661505,"creatorTelegramId":1186580139},{"id":"figure-drawing-session-2026","name":"Figure drawing session","slug":"figure-drawing-session-2026","description":"It is happening! We're a group of people that love to draw models together. For some of us it is studying the human form, for some others it is meditation, for some others it is play, or all of that together. We're organizing monthly sessions of live figure drawing. \nA compensation for the model and for the use of the space is asked (recommended amount 10 euros)\nNo registration needed! If you're interested to model or if you have any questions mail us at figuredrawingwageningen@proton.me.","startDate":"2026-05-07T20:00:00+00:00","endDate":"2026-05-07T22:00:00+00:00","location":{"name":"De Cultuurwerkplaats","city":"Wageningen"},"category":["art"],"tags":[],"url":"","price":"donation","status":"scheduled","lat":51.967483,"lon":5.674586,"creatorTelegramId":5746036803},{"id":"bevrijdingsbraderie-2026","name":"Bevrijdingsbraderie","slug":"bevrijdingsbraderie-2026","description":"The annual Liberation Street Fair will be held on Friday, May 8. From 10:00 AM to 8:00 PM, Hoogstraat, Serreplein, Bergstraat, and 5 Mei Plein will be filled with delightful stalls. The fair is characterized by the wide variety of products and delicacies. Stroll along the stalls in search of a new piece of jewelry, a beautiful piece of clothing, or a good book; there is something for everyone. Enjoy a tasty portion of poffertjes, a warm stroopwafel, or settle down on one of the many terraces for a cozy cup of coffee. The fair will be enlivened by brass bands and musicians.","startDate":"2026-05-08T10:00:00+00:00","endDate":"2026-05-08T20:00:00+00:00","location":{"name":"Wageningen City Centre","city":"Wageningen"},"category":["art","music","markets","food"],"tags":["fair","market","bands"],"url":"https://www.proefwageningen.nl/nl/agenda/3032335789/wageningse-bevrijdingsbraderie","price":"free","status":"scheduled","creatorTelegramId":1186580139},{"id":"jhoomo-re-bollywood-event-2026","name":"Jhoomo Re Bollywood Event","slug":"jhoomo-re-bollywood-event-2026","description":"Musiek, dans, zang, eten en als afsluiting een DJ","startDate":"2026-05-09T18:00:00+00:00","endDate":"2026-05-09T23:00:00+00:00","location":{"name":"Theater Junushoff","city":"Wageningen"},"category":["food","music","dance"],"tags":[],"url":"www.junushoff.nl","price":"paid","status":"scheduled","lat":51.96667,"lon":5.661391,"creatorTelegramId":883208832},{"id":"arts-crafts-and-expo-s-at-aurora-corner-2026","name":"Arts, crafts and expo's at Aurora corner","slug":"arts-crafts-and-expo-s-at-aurora-corner-2026","description":"Dear Jesters, in May we're gathering twice at Aurora corner to prepare the new exhibition that's going to be about 🥁🥁🥁 Wageningen communities! Everyone is welcome. And you're also welcome bring nice books and decorations you wish to share with the people that use this corner!","startDate":"2026-05-11T12:00:00+00:00","endDate":"2026-05-11T15:00:00+00:00","location":{"name":"Aurora building, Wageningen Campus","city":"Wageningen"},"category":["art","politics"],"tags":["linocut","community"],"url":"","price":"free","status":"scheduled","lat":51.982879,"lon":5.658381,"creatorTelegramId":883208832},{"id":"kick-off-event-for-critical-alternative-research-methods-course-2026","name":"Kick-off event for Critical Alternative Research Methods Course","slug":"kick-off-event-for-critical-alternative-research-methods-course-2026","description":"How does the question shape the answer? How to make sense of erased, obscured or silenced data? In this event, we invite a panel of journalists and Intelligence Studies scholars to explore the distinct, but often intersecting, paths of the journalist and the academic investigation in quest of social justice. In his remarkable piece of work, the documentary \"Why Srebrenica had to fall”, journalist Huub Jaspers exposes the hidden political failures underlying Bosnia mass atrocities of the 1990s. The public will be invited to compare, contrast, and critique different ways of apprehending thorny questions from various methodological perspectives. The event is an opportunity to discuss how to achieve criticality in qualitative research, beyond dominant and oppressive historical narratives.","startDate":"2026-05-13T11:00:00+00:00","endDate":"2026-05-13T14:00:00+00:00","location":{"name":"Impulse, Speaker Corner, Stippeneng 2, Wageningen","city":"Wageningen"},"category":["politics","talks"],"tags":["politics","symposium","documentary","social","justice","bosnia","srebrenica"],"url":"https://www.otherwisewageningen.org/#:~:text=Kick%2Doff%20event%20for%20Critical%20Alternative%20Research%20Methods%20Course","price":"free","status":"scheduled","lat":51.984052,"lon":5.661678,"creatorTelegramId":1186580139},{"id":"third-places-arts-crafts-gathering-2026","name":"Third Places - Arts & Crafts Gathering","slug":"third-places-arts-crafts-gathering-2026","description":"Dear OtherWisers,\n\nIn the 5th edition of our Third Places gatherings, we invite you to come and explore feelings of belonging, home, and identity through clay-making.\n\nWhere or what feels like home to you? What does it mean to live abroad? What roots you, and what has shaped who you are today?\n\nWe will begin with a few guiding reflection questions, such as those mentioned above, to gently arrive at the theme. Then we will create small clay figures, each with a hidden symbol or message that reflects our personal experiences of identity, migration, and belonging.\nAfterwards, we will share the story behind our pieces and the feelings that guided them.\n\nNo experience is needed - all materials will be provided!","startDate":"2026-05-13T18:00:00+00:00","endDate":"2026-05-13T20:30:00+00:00","location":{"name":"De Cultuurwerkplaats","city":"Wageningen"},"category":["art"],"tags":["art","clay"],"url":"https://www.otherwisewageningen.org/#:~:text=this%20link%20!-,Third%20Places%20%2D%20Arts%20%26%20Crafts%20Gathering,-When%3A%2013th","price":"free","status":"scheduled","lat":51.967483,"lon":5.674586,"creatorTelegramId":1186580139},{"id":"quiet-is-the-new-loud-2026","name":"Quiet is the New Loud!","slug":"quiet-is-the-new-loud-2026","description":"\"Quiet is the New Loud!” is one of Popcultuur Wageningen's monthly series of intimate, low-volume concerts at the cozy and relaxed setting of the public library in Wageningen: De bblthk. Since 2011, it has built a strong reputation, with a silent, attentive audience creating a unique experience for both listeners and performers. So, come visit de bblthk to enjoy the best acoustic singer-songwriters and bands from the Netherlands!\n\n\nThe Flamenco Thief\nCraig Sutton, aka “The Flamenco Thief”, is an English instrumentalist who blends fingerstyle and percussive guitar techniques to produce a classic-contemporary Mediterranean sound with lashings of South-American substance. His music incorporates Spanish Acoustic, Latin, Rumba, and Bossa Nova with Hip-Hop and Electronica. With a career spanning 14 years, 4 albums, and numerous tours in Europe, Asia, and South America, he has established himself as a respected artist within the independent music scene. \n \nHigh Horse\nMeet the intimate and surprising Utrecht-based duo High Horse. High Horse performs a diverse selection of Americana and folk songs: always beautiful and unexpected tracks with a story to tell. Let yourself be carried away by their two-part harmonies and the sounds of their acoustic guitars. High Horse plays a mix of original songs and covers.\nHigh Horse has extensive stage experience as a duo. They recently performed at TivoliVredenburg. The band members are also active in several other musical projects, including Cosmopolitans, an indie pop group from Utrecht. In 2022, High Horse entered the studio to record the demo Out in the Open, featuring three original songs. In June 2024, they returned to the studio and released the track Yellow Road.\n\nSo, see you on the 13th of May! ;)","startDate":"2026-05-13T20:30:00+00:00","endDate":"2026-05-13T22:30:00+00:00","location":{"name":"De bblthk","city":"Wageningen"},"category":["music"],"tags":["music","concert","live","music"],"url":"https://popupop.nl/event/quiet-is-the-new-loud-8","price":"free","status":"scheduled","lat":51.967579,"lon":5.665799,"creatorTelegramId":1186580139},{"id":"pizza-party-at-the-creative-garden-2026","name":"Pizza Party at the Creative Garden","slug":"pizza-party-at-the-creative-garden-2026","description":"Pizza party at the Creative Garden this Sunday\nThe Creative Garden is a community garden where members grow vegetables, fruits, and herbs together. Everyone is welcome to join our weekly gardening sessions and potluck lunch.\nThis Sunday, 17.5, we will have a pizza party starting at 14:00. We will also have our regular gardening activities starting from 12:00.\nWant to join the pizza party? Then please register at https://forms.gle/CCds8E3JhHzB5Zev7\nHope to see you there!","startDate":"2026-05-17T14:00:00+00:00","endDate":"2026-05-17T18:00:00+00:00","location":{"name":"Creative Garden","city":"Wageningen"},"category":["food"],"tags":["fundraising"],"url":"https://forms.gle/CCds8E3JhHzB5Zev7","price":"donation","status":"scheduled","lat":51.989464,"lon":5.656651,"creatorTelegramId":883208832},{"id":"digital-independence-and-you-2026","name":"Digital Independence and You","slug":"digital-independence-and-you-2026","description":"Digital Independence \nA workshop to empower YOU, the computer user!\n\nAre you a computer user? Do you feel powerless towards your computer sometimes? Have you experienced being afraid of Windows updating during an exam? Or having to buy a new computer because Windows or macOS does not support your old computer anymore, even though it works perfectly fine? Do you want to become (a bit) independent of American Big Tech? Have you ever considered that you can change these tools to make them fit your needs, your device, and the world?\nIf you are silently thinking, “Oh, but I am not a computer nerd”; I don’t know anything about computers, this is the workshop for you!\n\nThe program:\n  - basic terms and what an operating system does\n  - the differences in major operating systems\n  - open-source and free software\n  - software use from a political perspective and sustainable software\n  - how to change your operating system and try out the alternatives\n\nWhat to bring: We will try out stuff in the workshop, so if  you have the possibility, bring a laptop and some empty storage media (for example, an USB stick: 4 GB is good, 8 GB is even better, and more is no problem :)).\n\nP. S.: If you are a computer nerd you are of course also welcome, but we will probably cover knowledge you already have :)","startDate":"2026-05-20T17:30:00+00:00","endDate":"2026-05-20T19:30:00+00:00","location":{"name":"Old Library, The Clockhouse","city":"Wageningen"},"category":["workshops","politics"],"tags":["workshop","computers"],"url":"https://www.otherwisewageningen.org/#:~:text=Digital%20Independence%20and%20You","price":"free","status":"scheduled","creatorTelegramId":50375278},{"id":"pop-up-dinner-from-dutch-soils-2026","name":"Pop-up dinner - From Dutch Soils","slug":"pop-up-dinner-from-dutch-soils-2026","description":"Join us for a special Dutch diner tomorrow in Ivo’s (18-21h) :)","startDate":"2026-05-20T18:00:00+00:00","endDate":"2026-05-20T21:00:00+00:00","location":{"name":"Ivo's Bread & Pizza","city":"Wageningen"},"category":["food"],"tags":["local","food"],"url":"","price":"donation","status":"scheduled","lat":51.964809,"lon":5.66133,"creatorTelegramId":883208832},{"id":"human-control-of-ai-2026","name":"Human control of AI","slug":"human-control-of-ai-2026","description":"Do we still control AI, or is controlling such a rapidly advancing system merely an illusion we tell ourselves to cope with its speed and complexity? And if we can stay in control, how should we do this — and who is responsible?\n\nThese are just some of the pressing questions that have emerged with the rapid normalisation of AI in our everyday lives and work environments.\n\nOn the 20th of May, we hope Dr. Sietze Kail Kuilman can help us explore some of these questions during another enormously interesting Science Café.\n\nThe evening will also feature wonderful live music by Troubagroove, and there may even be a few more exciting speakers joining us.\n\nSee you on Wednesday at Loburg!","startDate":"2026-05-20T19:45:00+00:00","endDate":"2026-05-20T22:00:00+00:00","location":{"name":"Loburg","city":"Wageningen"},"category":["talks","music"],"tags":["ai","talk","science"],"url":"https://sciencecafewageningen.nl/","price":"free","status":"scheduled","lat":51.966772,"lon":5.664952,"creatorTelegramId":1186580139},{"id":"wageningse-goede-moed-2026","name":"Wageningse Goede Moed","slug":"wageningse-goede-moed-2026","description":"Op donderdag 21 mei gaan weer heel veel Wageningers bij elkaar eten. Een mooie gelegenheid om je onbekende stadsgenoten te ontmoeten.\n\nNa afloop verzamelen we in de Grote Kerk voor een toetje, een Goede-Moed-Show en een Goede-Moed-Borrel. Je bent van harte uitgenodigd om mee te eten. En als je wilt, kun je ook thuis voor andere Wageningers koken.\n\nJe kunt je opgeven op www.wageningsegoedemoed.nl . Het is gratis, maar als je wilt kun je een bijdrage doneren zodat we meer Goede Moed kunnen organiseren.\n\nOngeveer een week van tevoren hoor je bij wie je kunt eten of voor wie je kunt koken als je je aanmeldt als kok. Meer informatie vind je op de website.","startDate":"2026-05-21T17:00:00+00:00","endDate":"2026-05-21T22:00:00+00:00","location":{"name":"Each other's homes across Wageningen","city":"Wageningen"},"category":["food"],"tags":["goed","moet","goedmoet","charity","dinner","neighbors"],"url":"https://wageningsegoedemoed.nl/","price":"free","status":"scheduled","creatorTelegramId":1186580139},{"id":"forro-classes-2026","name":"Forró classes","slug":"forro-classes-2026","description":"*Second block of forró classes is coming up!*\n\nWe will give open level classes and continue with easy turns and figures. If you didn’t manage to join the first block, no worries! You can still join, we adapt the level to the people that are there 💃\n\n*Free taster class on Thursday the 21st of May.* Afterwards four weeks of lessons 🙌\n\n- 21 May (Free taster)\n- ⁠28 May\n- ⁠4 June \n- ⁠11 June\n- ⁠18 June\n\n🎟️ Sign up here: https://forms.gle/AghCNVGP62EPYGa8A","startDate":"2026-05-21T20:00:00+00:00","endDate":"2026-05-21T22:00:00+00:00","location":{"name":"Wijkcentrum the Pomhorst","city":"Wageningen"},"category":["dance","workshops"],"tags":["dance","classes","brazil"],"url":"https://forms.gle/AghCNVGP62EPYGa8A","price":"free","status":"scheduled","lat":51.975061,"lon":5.661825,"creatorTelegramId":883208832},{"id":"0317-x-indiepub-2026","name":"0317 Pre-Party x InDiePub","slug":"0317-x-indiepub-2026","description":"𝗥𝗲𝗮𝗱𝘆 𝘁𝗼 𝗣𝗥𝗘-𝗣𝗔𝗥𝗧𝗬? 🔊 We’ve lined up four sizzling hot DJs + a live band in collab with InDiePub!! 𝗘𝗻𝘁𝗿𝘆 𝗶𝘀 𝗳𝗿𝗲𝗲 𝗮𝗻𝗱 𝗼𝗽𝗲𝗻 𝘁𝗼 𝗮𝗹𝗹 - come get a taste on May 21st! See you at Loburg ❀ೃ࿔ ✽✿｡ ❀˚⋆ ｡\n\n0317 Festival is all about that spicy mix of live music, local talent, and art. We’re focusing more on the local every year so come hear what’s here :))","startDate":"2026-05-21T21:00:00+00:00","endDate":"2026-05-21T23:30:00+00:00","location":{"name":"Loburg","city":"Wageningen"},"category":["music","dance"],"tags":["music","band","dj","concert"],"url":"https://www.loburg.com/events/indiepub-x-preparty-0317/#:~:text=0-,INDIEPUB%20X%20PREPARTY%200317,-21","price":"free","status":"scheduled","lat":51.966772,"lon":5.664952,"creatorTelegramId":1186580139},{"id":"jester-illustrators-open-work-session-2026","name":"Jester illustrators open work session","slug":"jester-illustrators-open-work-session-2026","description":"Wednesday 26th, come to our illustrating working session! We're going to focus on illustrating Jester articles (and the cover!), so you may either come spontaneously or ask us beforehand for available drafts. Materials provided. See you there?","startDate":"2026-05-27T16:00:00+00:00","endDate":"2026-05-27T20:00:00+00:00","location":{"name":"Clock house","city":"Wageningen"},"category":["workshops","art","volunteering"],"tags":[],"url":"https://thejesterwageningen.com/","price":"free","status":"scheduled","lat":51.96754,"lon":5.675671,"creatorTelegramId":883208832},{"id":"menstrual-health-day-2026-2026","name":"Menstrual Health Day 2026","slug":"menstrual-health-day-2026-2026","description":"May 28th is Global Menstrual Health Day!\nJoin us for a day of collective learning, reflection, and creative expression as we explore Menstrual Justice from multiple perspectives. We have prepared a day full of activities for you that will take place in the buildings Gaia and Forum on campus.\n\nLunch talk & trivia (with special prizes): 12:00-13:30, Building Gaia, Plateau (1st floor)\nAn interactive conversation unpacking menstrual myths and misinformation. Together we'll reflect on the less-discussed realities of menstruation in an open and inclusive space!\n\nZine-making & Collage: 14:00 16:00, Building Gaia, Room: Gaia 2 (ground floor)\nExplore personal and collective menstrual narratives using prompts and mixed materials. Join this session and experiment with themes of language, bodies, and fluids through zine-making and collage.\n\nFilm Screening & Discussion: 19:00 -21:30, Building Forum, Room: B0031 (ground floor)\n\nHow is gender based discrimination connected to practices of food and menstruation? Join for an evening screening of the Great Indian Kitchen, a film that dives into gender, menstruation, caste, and the repetitive invisibility of domestic labor. A group discussion will follow the movie, so stay around for some collective reflections!\n\nPlease note: This film addresses sensitive topics such as gender-based violence, domestic roles, and patriarchal structures, which may be uncomfortable or triggering for some viewers!\n\nSee you there!","startDate":"2026-05-28T12:00:00+00:00","endDate":"2026-05-28T21:30:00+00:00","location":{"name":"Forum and Gaia Building","city":"Wageningen"},"category":["talks","politics","movies"],"tags":["women","health","menstrual"],"url":"https://www.otherwisewageningen.org/#:~:text=Menstrual%20Health%20Day%202026","price":"free","status":"scheduled","lat":51.985397,"lon":5.663768,"creatorTelegramId":1186580139},{"id":"marionetten-workshop-2026","name":"Marionetten Workshop","slug":"marionetten-workshop-2026","description":"Try out! Workshop zelf marionet maken van (bier)dopjes, eierdozen en (plastic) bekers","startDate":"2026-05-29T17:00:00+00:00","endDate":"2026-05-29T20:00:00+00:00","location":{"name":"De Superette","city":"Wageningen"},"category":["workshops","art"],"tags":["marionet","workshop"],"url":"https://desuperette.nl/event/marionetten-workshop","price":"donation","status":"scheduled","lat":51.966584,"lon":5.680057,"creatorTelegramId":1186580139},{"id":"toonkunstkoor-2026","name":"Jubileumconcert Toonkunstkoor","slug":"toonkunstkoor-2026","description":"Toonkunstkoor Wageningen geeft op vrijdag 29 mei 2026 een Jubileumconcert in het kader van haar 80e verjaardag. Hieraan wordt meegewerkt door Judith van Wanroij (sopraan), Deirdre Angenent (mezzosopraan), Falco van Loon (tenor), Raoul Steffani (bas), en Het Promenadeorkest.\n\nUitgevoerd worden:\n– Musicmakers, E. Elgar\n– Krönungsmesse, W.A. Mozart\n– Te Deum, A. Dvorak\n\nKoor, orkest en solisten staan onder de bezielende leiding van dirigent Hans de Wilde.\n\nTIP: NEEM EEN KUSSENTJE MEE IVM DE SOMS HARDE KERKBANKEN.\n\nKERK GAAT OPEN OM 19.15 UUR.","startDate":"2026-05-29T20:00:00+00:00","endDate":"2026-05-29T20:00:00+00:00","location":{"name":"Johannnes de Doperkerk","city":"Wageningen"},"category":["music"],"tags":[],"url":"https://toonkunst-wageningen.nl/kaartverkoop-jubileumconcert-gestart/","price":"paid","status":"scheduled","lat":51.967648,"lon":5.667084,"creatorTelegramId":5751628819},{"id":"ontspoort-showcase-festival-2026-2026","name":"Ontspoort! Showcase Festival 2026","slug":"ontspoort-showcase-festival-2026-2026","description":"All aboard, Ede-Wageningen Ontspoort!\nOn May 30, the fifth edition of this annual showcase festival will take place! One night featuring the newest and best acts from Ede and Wageningen on three stages inside and outside Astrant. In other words, the perfect night to discover and support local talent!","startDate":"2026-05-30T19:00:00+00:00","endDate":"2026-05-31T00:00:00+00:00","location":{"name":"Astrant Cultureel centrum","city":"Ede"},"category":["music"],"tags":["music","festival","live","bands","concert","concerts"],"url":"https://astrant-ede.nl/evenementen/ontspoort/","price":"free","status":"scheduled","lat":52.045144,"lon":5.669012,"creatorTelegramId":1186580139},{"id":"nachtvlinderen-met-de-knnv-2026","name":"Nachtvlinderen met de KNNV","slug":"nachtvlinderen-met-de-knnv-2026","description":"The KNNV Wageningen branch organizes all kinds of activities during Biodiversity Week.\n\nOn Saturday, May 30, for example, there is a nature market in the city center and various excursions. That evening—weather permitting—there will also be a moth excursion in the Belmonte Arboretum. Moths will be observed on or near the central lawn using two setups (lamps with sheets).\n\nNote: Unfortunately, this activity cannot take place if it is stormy or raining. Participation is free.","startDate":"2026-05-30T20:00:00+00:00","endDate":"2026-05-30T23:30:00+00:00","location":{"name":"Belmonte Arboretum","city":"Wageningen"},"category":["nature"],"tags":["moths","arboretum","insects"],"url":"https://belmontearboretum.nl/agenda/nachtvlinderen-met-de-knnv/","price":"free","status":"scheduled","lat":51.966409,"lon":5.688911,"creatorTelegramId":1186580139},{"id":"aan-de-poort-van-eden-2026","name":"Aan de poort van Eden","slug":"aan-de-poort-van-eden-2026","description":"Vocaal Ensemble Vivavoce zal op 30 mei 2026 het concert met het thema “Aan de poort van Eden” drie mooie werken uitvoeren:\n– Adam’s Lament van Arvo Pärt\n– Missa Sancti Georgii van Herman Finkers\n– Gloria van Antonio Vivaldi\n\nIn het intense koorwerk van Pärt beklaagt Adam zichzelf over het feit dat hij het Paradijs maar ook God heeft verlaten. Toch gloort er altijd weer hoop op verzoening. Deze hoop en blijde verwachting wordt bezongen in het Gloria van Vivaldi en kracht bijgezet met de Sint Jorismis van Finkers.\n\nKortom: “Van hemelhoog juichend tot ten dode bedroefd” . Met een kleine knipoog zou je kunnen zeggen dat dit ons concertprogramma samenvat. We bewegen ons tussen uitersten: vreugde en verstilling, lofzang en verlies, traditie en experiment. En precies in dat spanningsveld voelen koor en kamerorkest zich thuis.\n\nFelix Hirn zal het concert dirigeren. De okestrale begeleiding zal uitgevoerd worden door Ensemble Sequenza.","startDate":"2026-05-30T20:15:00+00:00","endDate":"2026-05-30T22:00:00+00:00","location":{"name":"Grote Kerk","city":"Wageningen"},"category":["music"],"tags":["concert","vivaldi","choir","church"],"url":"https://www.vivavoce.nl/#:~:text=BESTEL%20KAARTEN-,Aan%20de%20poort%20van%20Eden,-Op%20zaterdag%2030","price":"paid","status":"scheduled","lat":51.964854,"lon":5.662612,"creatorTelegramId":1186580139},{"id":"mantra-concert-met-anadya-2026","name":"Mantra concert met Anadya","slug":"mantra-concert-met-anadya-2026","description":"Een middag samen zingen\nHet wordt een middag vol Licht en Vrede vanuit het hart, voor jezelf en voor de wereld. Met zang, verstilling, meditatie, lichtpuntjes en inspiratie.\nWe zingen mantra’s en liederen uit verschillende tradities en culturen.\n\nJe kunt meezingen, luisteren, een andere stem zingen, net wat fijn is voor je. Na iedere mantra is er even stilte om te ontspannen en de klanken door te laten werken.\n\nWe maken van de plek een tempel, met een mooi altaar met krachtvoorwerpen en foto’s. Zet je ook iets neer? Een kaars, een kristal, veer, etc. en/of een foto van een geliefde die wel wat licht en vrede kan gebruiken.","startDate":"2026-05-31T15:00:00+00:00","endDate":"2026-05-31T16:30:00+00:00","location":{"name":"Vrije School","city":"Wageningen"},"category":["yoga","meditation","music"],"tags":["mantra","singing","mantras","meditation"],"url":"https://www.anadya.nl/concerten/","price":"paid","status":"scheduled","lat":51.968644,"lon":5.649161,"creatorTelegramId":1186580139},{"id":"figure-drawing-session-june-2026","name":"Figure drawing session  June","slug":"figure-drawing-session-june-2026","description":"It is happening! We're a group of people that love to draw models together. For some of us it is studying the human form, for some others it is meditation, for some others it is play, or all of that together. We're organizing monthly sessions of live figure drawing. \nA compensation for the model and for the use of the space is asked (recommended amount 10 euros)\nNo registration needed! If you're interested to model or if you have any questions mail us at figuredrawingwageningen@proton.me.","startDate":"2026-06-04T20:00:00+00:00","endDate":"2026-06-04T22:00:00+00:00","location":{"name":"De Cultuurwerkplaats","city":"Wageningen"},"category":["art"],"tags":["drawing"],"url":"figuredrawingwageningen@proton.me","price":"donation","status":"scheduled","lat":51.967483,"lon":5.674586,"creatorTelegramId":883208832},{"id":"open-dag-40-jaar-manege-zonder-drempels-2026","name":"OPEN DAG – 40 JAAR MANEGE ZONDER DREMPELS","slug":"open-dag-40-jaar-manege-zonder-drempels-2026","description":"🎉 OPEN DAG – 40 JAAR MANEGE ZONDER DREMPELS 🎉\n\nDit jaar bestaat Manege Zonder Drempels 40 jaar en dat vieren we graag met jullie!\n\nKom genieten van demonstraties van het huifbedrijden, paardenshows en een spectaculaire boogschutter te paard. 🐴🏹\n\nIedereen is van harte welkom!\n\n🎉OPEN DAY - 40 YEARS MANEGE ZONDER DREMPELS 🎉\n\nThis year the Manege Zonder Drempels turns 40 and we want to celebrate it with you!\n\nCome by to enjoy demonstrations of the huifbed rides, horse shows and a spectacular archer on horseback. 🐴🏹\n\nEveryone is welcome!","startDate":"2026-06-06T12:00:00+00:00","endDate":"2026-06-06T17:00:00+00:00","location":{"name":"Manege zonder Drempels","city":"Bennekom"},"category":["sport","nature"],"tags":["horses"],"url":"https://www.manege-zonder-drempels.nl/","price":"free","status":"scheduled","lat":52.011316,"lon":5.662162,"creatorTelegramId":883208832},{"id":"kunstroute-renkum-2026","name":"Kunstroute Renkum","slug":"kunstroute-renkum-2026","description":"On the 6th and 7th of June, an art festival will fill the streets of six villages: Renkum, Oosterbeek, Wolfheze, Doorwerth, Heelsum and Heveadorp.\n\nThis year, 88 artists are taking part in the art trail: 37 in their own studios and 51 at various group venues.\n\nAll six villages in the municipality of Renkum are open to visitors. Most artists are exhibiting in Oosterbeek, Doorwerth, Renkum and Heelsum, but Wolfheze and Heveadorp are also well worth a visit.\n\nFrom small studios in back gardens to large group venues in schools and churches. From exhibitions in cosy living rooms to beautiful gardens filled with art.\n\nWill we see you on 6 and 7 June?","startDate":"2026-06-06T13:00:00+00:00","endDate":"2026-06-07T19:00:00+00:00","location":{"name":"Renkum, Oosterbeek, Wolfheze, Doorwerth, Heelsum en Heveadorp","city":"Renkum"},"category":["art","markets","nature","workshops"],"tags":["art","exibition","exhibition"],"url":"https://kunstroute-renkum.nl/","price":"free","status":"scheduled","creatorTelegramId":1186580139},{"id":"drag-startershow-2026","name":"DRAG STARTERSHOW","slug":"drag-startershow-2026","description":"Are you dreaming of shining on stage with your own drag persona? But don’t know where to start? House of FlocKing Birds offers you a warm nest to start and develop your drag. Every 2 months we have an open rehearsal where everybody can join.\n\nOur next open rehearsal and two extra evenings will be a package deal in which we build up to your first performance during our starter show. In a few sessions we will coach you to your (first) full performance(s) on stage with the confidence to give it your all. \n\nThursday May 7th – 19:00 – 22:00 - Setting up your act and persona\nSunday May 17th – 14:30 – 17:00 - Open rehearsal - rehears acts\nWednesday May 27th – 19:00 – 22:00 - Rehearse the whole show\nSunday June 7th - SHOW\n@Cultuurwerplaats Wageningen\n\nTake note: the starter show will be only for performers that have just started drag. The audience of the starter show will be in the first place the friends and family of the performers. The show as well as the rehearsals will be on a donate what you can pay basis to cover the costs.\n\nSign up via\nhttps://forms.gle/428gkjdwfpVRMiat5","startDate":"2026-06-07T19:00:00+00:00","endDate":"2026-06-07T22:00:00+00:00","location":{"name":"De Cultuurwerkplaats","city":"Wageningen"},"category":["art","workshops"],"tags":["drag","show"],"url":"https://forms.gle/428gkjdwfpVRMiat5","price":"donation","status":"scheduled","lat":51.967483,"lon":5.674586,"creatorTelegramId":883208832},{"id":"breaking-ground-feminist-futures-for-food-and-farming-2026","name":"Breaking Ground: Feminist Futures for Food and Farming","slug":"breaking-ground-feminist-futures-for-food-and-farming-2026","description":"Join us in a discussion about methods, theories, and new insights into the intersections of gender and agriculture. The event includes four short presentations, followed by an open panel discussion.\nIf you are not able to attend in person, you are welcome to join us online, please indicate so and we will provide more information on how to join.","startDate":"2026-06-08T12:00:00+00:00","endDate":"2026-06-08T15:00:00+00:00","location":{"name":"Forum B0218 or online","city":"Wageningen"},"category":["talks","workshops","nature"],"tags":["feminist","agriculture","talk","practice"],"url":"https://forms.office.com/pages/responsepage.aspx?id=5TfRJx92wU2viNJkMKuxj34X4cswvUdEm9uJq3oNFlZUMEc3QTRNNjBMVVpDVUg0U0dGOTVVVThFUy4u&route=shorturl","price":"free","status":"scheduled","lat":51.985397,"lon":5.663768,"creatorTelegramId":1186580139},{"id":"pop-up-dinner-kimchi-2026","name":"Pop up dinner - Kimchi","slug":"pop-up-dinner-kimchi-2026","description":"Wednesday 10th of June | 17-21h | Ivo’s Bakery 🫜\n\nJoin us for our fifth and FINAL pop up upcoming Wednesday in Ivo’s bakery! we are treating you with home made kimchi and other goodies 🍲❤️‍🔥 make sure not to miss out!!","startDate":"2026-06-10T17:00:00+00:00","endDate":"2026-06-10T21:00:00+00:00","location":{"name":"Ivo's Bread & Pizza","city":"Wageningen"},"category":["food"],"tags":["kimchi","homemade"],"url":"","price":"donation","status":"scheduled","lat":51.964809,"lon":5.66133,"creatorTelegramId":883208832},{"id":"fingerlickin-the-beach-episode-2026","name":"Fingerlickin’ : The Beach Episode","slug":"fingerlickin-the-beach-episode-2026","description":"Don’t forget your swimwear!\n\nEnjoy your sex on the beach and dance all night long at our sexy, beach-themed party! With dance and pole acts between 23:00 and 00:00, a basement full of music and summer vibes, and of course a photobooth to capture your beautiful beach outfit, this year’s Fingerlickin’ is the perfect way to start your summer!","startDate":"2026-06-11T22:00:00+00:00","endDate":"2026-06-12T04:00:00+00:00","location":{"name":"Unitas","city":"Wageningen"},"category":["dance","music"],"tags":["beach","party","music","concert"],"url":"https://www.ticketkantoor.nl/shop/Fingerlickin26","price":"paid","status":"scheduled","lat":51.966028,"lon":5.664673,"creatorTelegramId":1186580139},{"id":"mens-anti-patriarchy-meet-up-2026","name":"Mens Anti-Patriarchy Meet up","slug":"mens-anti-patriarchy-meet-up-2026","description":"Mens Anti-Patriarchy Meet Up\nWhen: June 12 @18:00\nWhere: Clockhouse, Old Library (Generaal Foulkesweg 37)\n\nWe (2 men) have been interested in creating a mens group for some time. Having both followed various workshops and readings around critical masculinity and anti-patriarchy mens groups we have finally started meeting on a weekly basis.\n\nInspired by the framework outlined by the book \"Difficult Hugs\", we have started a small group here in Wageningen and are keen to share what it is and why we think it is important. We also want to inspire you to engage with the topic and create a group yourself. Get active NOW!\n\nWe (those who recieve unearned male privilege) need to learn to sort out our own shit so we can have more fulfilling relationships and stop hurting those around us. We need to practice how to open up emotionally and support one another instead if relying on flinta friends and partners for emotional support. We also need to hold eachother accountable.\n\nFar from experts, we will open the discussion to learn from one another and reflect on how patriarchy affects both us and those around us. Some exercises are prepared to practice sharing emotions and deep listening. \n\nour use of \"men\" includes all unique experiences of people who have been socialized as, or identify as, men or masculine.","startDate":"2026-06-12T18:00:00+00:00","endDate":"2026-06-12T20:00:00+00:00","location":{"name":"Clock house","city":"Wageningen"},"category":["politics"],"tags":[],"url":"https://thejesterwageningen.com/","price":"free","status":"scheduled","lat":51.96754,"lon":5.675671,"creatorTelegramId":883208832},{"id":"0317-festival-2026","name":"0317 Festival","slug":"0317-festival-2026","description":"Forget about packed trains and traveling far and wide; we want you to walk to your favorite festival site. 0317 is here because we all deserve a place to dance and enjoy live-music within our town. Indoor and outside! On a lovely saturday in June, we’ll transform Argo’s waterside spot into a festival full of chaos, dancing, sweating and sweet surprises 💥\n\nLet’s get messy 🌿🌸","startDate":"2026-06-13T20:00:00+00:00","endDate":"2026-06-14T00:00:00+00:00","location":{"name":"ARGO Site","city":"Wageningen"},"category":["music"],"tags":["festival","music","party"],"url":"https://0317festival.nl/nl/","price":"paid","status":"scheduled","lat":51.957611,"lon":5.648187,"creatorTelegramId":1186580139},{"id":"belmondo-festival-2026","name":"Belmondo  Festival","slug":"belmondo-festival-2026","description":"The Belmondo Festival is Wageningen's premier international music, song, and dance festival. Every two years, in the beautiful setting of the Belmonte Arboretum on the Wageningse Berg, we celebrate the meeting of cultures, residents, students, new Wageningenmers, and visitors. An afternoon full of performances, flavors, and stories from around the world. Right in the heart of Wageningen!\n\nLocal and international artists perform on multiple stages: from a choir and Bollywood dancers to a breakdance group, from a big band to Dutch-language pop. There is something for everyone to see and experience. Together, they showcase how colorful and creative Wageningen is. The international atmosphere comes from the people themselves: residents with diverse backgrounds making music, dancing, and enjoying themselves together.\n\nIn the International Street, you can taste dishes from all corners of the world, prepared by residents, students, newcomers, and volunteers.\n\nAdmission is free, and all proceeds from food and drinks go to a local charity: Buddy to Buddy Wageningen, an organization that connects newcomers and Wageningen residents.\n\nThe festival is organized by the Belmondo Festival Foundation, which originated from Rotary Wageningen-Bergpoort and other Wageningen service clubs. Since the first edition in 2005, Belmondo has grown into a fixture on the Wageningen calendar: a celebration that celebrates freedom, connection, and diversity.\n\nIn 2026, we will celebrate the tenth edition, a special milestone that we would like to celebrate together with the city.\n\nWe look forward to that tenth edition on Sunday, June 14, 2026: a day full of color, meeting, and connection. Exactly as Belmondo is meant to be.","startDate":"2026-06-14T13:00:00+00:00","endDate":"2026-06-14T19:00:00+00:00","location":{"name":"Belmonte Arboretum","city":"Wageningen"},"category":["art","nature","dance","music","markets"],"tags":["festival","park","music","food"],"url":"https://belmondofestival.nl/","price":"free","status":"scheduled","lat":51.966409,"lon":5.688911,"creatorTelegramId":1186580139},{"id":"the-jester-s-summer-celebration-2026","name":"The Jester's summer celebration","slug":"the-jester-s-summer-celebration-2026","description":"📢The summer is here ☀️the Jester is almost published🗞️ , and you 🫵🏼 are cordially invited to come to the Jester's midsummer celebration! To do what? To play, create, chill, eat, and take some Jesters for you, your cat and your family. \nFun fact: we're going to make some use of old Jesters 😉 if you're curious you only have to come and see what we mean by that\nWhere: at the garden of Arboretumlaan 1, Wageningen\nWhen Thursday 18 June, from 19:00 to 22:00\nSee you there?","startDate":"2026-06-18T19:00:00+00:00","endDate":"2026-06-18T23:00:00+00:00","location":{"name":"De Cultuurwerkplaats","city":"Wageningen"},"category":["food","music","art"],"tags":["play","create","chill","eat"],"url":"","price":"free","status":"scheduled","lat":51.967483,"lon":5.674586,"creatorTelegramId":883208832},{"id":"festival-aan-hogerwal-2026","name":"Festival aan Hogerwal","slug":"festival-aan-hogerwal-2026","description":"Wageningen harbour finest jam will bring a fresh selection of national and international artists ✨ on 20 and 21 June these artists will be rocking the walls once again and creating beautiful new artworks, we expect to see you there!\n\nUpcoming weeks we will share more info about the event and side programming, expect art, music, food and activities!","startDate":"2026-06-20T13:00:00+00:00","endDate":"2026-06-21T22:00:00+00:00","location":{"name":"Wageningen' harbour","city":"Wageningen"},"category":["art","workshops","music"],"tags":["graffiti","art","festival"],"url":"https://festivalhogerwal.nl/","price":"free","status":"scheduled","lat":51.971253,"lon":5.660694,"creatorTelegramId":1186580139},{"id":"buddy2buddy-x-otherwise-2026","name":"Buddy2Buddy x OtherWise","slug":"buddy2buddy-x-otherwise-2026","description":"Date: June 22\nTime:  17:30 - 21:30 \nLocation: Nude Toekomst, Mennonietenweg 15A\nCome join us for a warm and cozy evening full of meeting new people, cooking together, and enjoying delicious food!\nActivity:\nTogether we will prepare dolmas and share information about Buddy to Buddy and Otherwise.\nFood:\nWe will enjoy rice, lentil soup, and dolmas together.\nEveryone is welcome!\nRegistration is required via the registration form!\nWe look forward to seeing you!","startDate":"2026-06-22T17:30:00+00:00","endDate":"2026-06-22T21:30:00+00:00","location":{"name":"Stichting NuDe Toekomst","city":"Wageningen"},"category":["food","volunteering","talks"],"tags":[],"url":"https://www.otherwisewageningen.org/#:~:text=Buddy2Buddy%20x%20OtherWise","price":"free","status":"scheduled","lat":51.9658177,"lon":5.6534418,"creatorTelegramId":1186580139},{"id":"woetstok-wageningen-2026","name":"Woetstok Wageningen","slug":"woetstok-wageningen-2026","description":"On the longest summer evening, we hold the 'Wageningen Woetstok' festival in the Torckpark.\n 'Crazy about Music!'\nFor the eleventh time, we will be going completely wild again on Saturday, June 27, 2026, at the Wageningen Woetstok festival. As usual, in the Torckpark in the cozy center of Wageningen.\nFrom the many entries, we have once again been able to make a very fine selection of Wageningen talent.","startDate":"2026-06-27T13:00:00+00:00","endDate":"2026-06-28T00:00:00+00:00","location":{"name":"Torckpark","city":"Wageningen"},"category":["dance","music"],"tags":["festival","musical","concert"],"url":"https://www.loburg.com/woetstok/","price":"free","status":"scheduled","lat":51.965915,"lon":5.666128,"creatorTelegramId":1186580139},{"id":"open-meeting-for-pride-protest-2026","name":"OPEN MEETING for Pride Protest","slug":"open-meeting-for-pride-protest-2026","description":"💜🖤OPEN MEETING for Pride Protest 🖤💜\n\n🌈SAVE THE DATE: on Saturday, 27th of June the Kikkers Collective Wageningen will organize the Wageningen Pride Protest!🌈\nPride is more than just a colorful party celebrating queer joy. Pride started as a protest with people fighting for their fundamental human rights. We believe that it is important to organize for queer and transfeminist rights in the parliament and on the streets. We call upon everybody, to join the Wageningen Pride Protest and to fight collectively for an intersectional trans feminist struggle to smash patriarchy, colonialism and capitalism! \n\nHow can you or your group join the protest? Do you want to hold a speech, co-organize the banner making session or play the drums during the protest? Join our open meeting to discuss practicalities!\n📆 Wednesday, May 27th\n⏰ 19:00 h\n📌 Clockhouse (most probably old library)","startDate":"2026-06-27T19:00:00+00:00","endDate":"2026-06-27T22:00:00+00:00","location":{"name":"Clock house","city":"Wageningen"},"category":["politics","volunteering"],"tags":["pride","protest","open"],"url":"","price":"free","status":"scheduled","lat":51.96754,"lon":5.675671,"creatorTelegramId":883208832},{"id":"gluren-bij-de-buren-2026","name":"Gluren bij de Buren","slug":"gluren-bij-de-buren-2026","description":"Sunday June the 28th, the amateur art festival Gluren bij de Buren (peeping at the neighbors) will return in Wageningen! We are still looking for hosts for gardens and artists that want to join!!\n\nGluren bij de buren is a yearly festival where gardens all over Wageningen transform into open-air stages where local artists can perform. \nIt is a perfect way for artist to have a stage or to try-out new things and for hosts it is a cosy and fun experience to have live music in your own garden!🌳☀️🎶\n\nInterested? You can sign up as an artist or garden until may 10th via this link: gbdb.nl/aanmelden\nAlso please share with people you know who’d like to join (musicians or people with gardens)!","startDate":"2026-06-28T13:00:00+00:00","endDate":"2026-06-28T18:00:00+00:00","location":{"name":"Gardens throughout all of Wageningen","city":"Wageningen"},"category":["art","music"],"tags":["concerts","live","music","bands","gardens"],"url":"https://glurenbijdeburen.nl/nl","price":"donation","status":"scheduled","creatorTelegramId":1186580139},{"id":"leeffestival-2026","name":"LEEFfestival","slug":"leeffestival-2026","description":"The LEEFFestival is a vibrant street theatre festival in the city centre of Wageningen, where the city transforms into a giant stage for one day. Visitors can enjoy music, theatre, dance, workshops, and surprising acts for young and old.\nThe organization deliberately opts for a broad program featuring both professional artists and enthusiastic amateurs. Audience participation and spontaneous initiatives make the festival extra lively.","startDate":"2026-07-05T13:00:00+00:00","endDate":"2026-07-05T18:00:00+00:00","location":{"name":"Wageningen city center","city":"Wageningen"},"category":["dance","art"],"tags":["festival","art","street","theatre"],"url":"https://www.leeffestival.nl/","price":"free","status":"scheduled","creatorTelegramId":1186580139},{"id":"lezing-ode-aan-het-onkruid-door-norbert-peeters-2026","name":"Lezing ‘Ode aan het onkruid’ door Norbert Peeters","slug":"lezing-ode-aan-het-onkruid-door-norbert-peeters-2026","description":"Je kent ze wel, van die planten die uitstekend hun eigen boontjes doppen en op eigen houtje door je tuin tieren. Iedereen heeft hier wel eens een strijd tegen geleverd. Iedereen heeft wel eens onkruid gewied. Maar wat maakt een plant tot onkruid? In ieder geval slaat de term 'onkruid' niet op een vaste groep plantensoorten. Veel soorten die vroeger werden verguisd, worden nu juist beschermd. Andere soorten ondergaan het tegenovergesteld lot. Exoten zoals de reuzenberenklauw en de Japanse duizendknoop zijn ooit naar Europa gebracht als sierplanten. Inmiddels is het tij gekeerd en worden ze vervloekt als ‘invasieve exoot’. Kortom, tijd om het woord ‘onkruid’ en onkruidplanten eens nader onder de loep te nemen. In deze lezing brengt botanisch filosoof Norbert Peeters een ode aan onkruid.","startDate":"2026-09-23T20:00:00+00:00","endDate":"2026-09-23T22:00:00+00:00","location":{"name":"Belmonte Arboretum","city":"Wageningen"},"category":["nature","talks"],"tags":["lecture","plant","philosophy"],"url":"https://belmontearboretum.nl/agenda/lezing-ode-aan-het-onkruid-door-norbert-peeters/","price":"paid","status":"scheduled","lat":51.966409,"lon":5.688911,"creatorTelegramId":1186580139},{"id":"plants-and-cuttings-exchange-fair-2026","name":"Plants and cuttings exchange fair","slug":"plants-and-cuttings-exchange-fair-2026","description":"9:00 Input plants, cuttings, seeds, gardening books, etc.\n9:30 am starts exchange, end of 10:30 am.\n\nYou are welcome with seeds, cuttings, bulbs and tubers and plants for indoors and outdoors. Also ‘green books’/garden leaves and used, good tools can be brought with you.\n\nThis grant is also free for non-members, even if you cannot insert plants yourself.\n\nThe coffee is ready! We do ask for a voluntary contribution for coffee and tea.","startDate":"2026-10-03T09:00:00+00:00","endDate":"2026-10-03T10:00:00+00:00","location":{"name":"Belmonte Arboretum","city":"Wageningen"},"category":["nature","markets"],"tags":["fair","plant","seeds","cuttings","exchange"],"url":"https://belmontearboretum.nl/agenda/planten-en-stekken-ruilbeurs-2/","price":"free","status":"scheduled","lat":51.966409,"lon":5.688911,"creatorTelegramId":1186580139},{"id":"yin-klank-2026","name":"Yin & Klank","slug":"yin-klank-2026","description":"Klank & Ontspanning\n\nWe hebben er zó naar uitgekeken, en nu is het eindelijk zover! Onze vrolijke energie komt samen in deze toffe samenwerking tussen Fleur |Shakti Sounds| en Laura |Meer Zen met Lau|.\n\nVoel je van harte welkom bij onze Yin yogasessie waarin je langer in houdingen verblijft om je diepe (bind)weefsels wakker te maken. Door te stretchen met Laura vergroot je je flexibiliteit, herstel je je energie en laat je spanning en stress wegvloeien. Zo ontstaat er ruimte in je lichaam.\n\nDe sessie krijgt een bijzondere extra laag door de live klanken van Fleur’s wereldinstrumenten, zoals klankschalen, handpan, fluit en sjamaandrum. De lange stretches worden hierdoor niet alleen gedragen, maar ook verdiept. Na de houdingen speelt ze graag nog even voor je door, zodat je heerlijk kunt wegzinken in een meditatieve ontspanning. Pure selfcare!\n\nNa afloop geniet je van een versgemaakte voorjaarsthee en iets lekkers.","startDate":"2026-10-11T14:00:00+00:00","endDate":"2026-10-11T16:00:00+00:00","location":{"name":"Het Yogaschooltje","city":"Wageningen"},"category":["meditation","yoga"],"tags":["yoga","yin","meditation"],"url":"https://hipsy.nl/event/170952-yin-klank","price":"paid","status":"scheduled","lat":51.965614,"lon":5.661818,"creatorTelegramId":1186580139},{"id":"popronde-wageningen-2026","name":"Popronde Wageningen","slug":"popronde-wageningen-2026","description":"Popronde is coming your way again this autumn! On Thursday, 29 October 2026, Popronde will once again take over the centre of Wageningen. Discover your favourite new acts and the headliners of tomorrow in your favourite pub, hairdresser’s, clothes shop, and of course at the -tag pop venue! \n\n🎟 Tickets? Not needed! Popronde is free and open to everyone. No hassle with expensive tickets, queues or sold-out shows—just pop along and discover new music!","startDate":"2026-10-29T21:00:00+00:00","endDate":"2026-10-30T01:00:00+00:00","location":{"name":"All across Wageningen","city":"Wageningen"},"category":["music","dance"],"tags":["concert","music","party"],"url":"https://popronde.nl/steden/wageningen","price":"free","status":"scheduled","creatorTelegramId":1186580139}];

  ];

  function escHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Pastel chip palette: bg + left-accent border
  const CHIP_PALETTE = [
    { bg: '#FEF3C7', border: '#D97706' }, // amber
    { bg: '#D1FAE5', border: '#059669' }, // emerald
    { bg: '#DBEAFE', border: '#2563EB' }, // blue
    { bg: '#EDE9FE', border: '#7C3AED' }, // violet
    { bg: '#FFE4E6', border: '#E11D48' }, // rose
    { bg: '#FEF9C3', border: '#CA8A04' }, // yellow
    { bg: '#CCFBF1', border: '#0D9488' }, // teal
  ];
  function chipColor(key) {
    const s = String(key || '');
    let h = 0;
    for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
    return CHIP_PALETTE[Math.abs(h) % CHIP_PALETTE.length];
  }

  const TZ_SUFFIX_RE = /(Z|[+-]\d{2}:\d{2})$/;
  function parseEventLocalDateTime(iso) {
    const parsed = new Date(String(iso).replace(TZ_SUFFIX_RE, ''));
    return Number.isNaN(parsed.getTime()) ? new Date(iso) : parsed;
  }

  function renderCalendar() {
    document.getElementById('month-title').textContent = `${MONTH_NAMES[month]} ${year}`;

    // First weekday of month (Mon-first: 0=Mon, 6=Sun)
    const firstDayRaw   = new Date(year, month, 1).getDay(); // 0=Sun
    const startOffset   = (firstDayRaw + 6) % 7;
    const daysInMonth   = new Date(year, month + 1, 0).getDate();
    const today         = new Date();

    // Gather events for this month
    const monthEvents = eventsData.filter((ev) => {
      const d = parseEventLocalDateTime(ev.startDate);
      return d.getFullYear() === year && d.getMonth() === month;
    });

    // Group by day-of-month
    const byDay = {};
    monthEvents.forEach((ev) => {
      const d = parseEventLocalDateTime(ev.startDate).getDate();
      if (!byDay[d]) byDay[d] = [];
      byDay[d].push(ev);
    });

    let html = '';

    // Empty leading cells
    for (let i = 0; i < startOffset; i++) {
      html += '<div class="cal-cell is-empty"></div>';
    }

    // Day cells
    const todayY = today.getFullYear();
    const todayM = today.getMonth();
    const todayD = today.getDate();

    for (let d = 1; d <= daysInMonth; d++) {
      const cellDate    = new Date(year, month, d);
      const weekdayIdx  = (cellDate.getDay() + 6) % 7; // 0=Mon..6=Sun
      const isWeekend   = weekdayIdx >= 5;
      const isToday = todayY === year && todayM === month && todayD === d;
      const isPast  = cellDate < new Date(todayY, todayM, todayD);
      const dayEvs  = byDay[d] || [];

      const classes = [
        'cal-cell',
        isToday ? 'is-today' : '',
        isPast  ? 'is-past'  : '',
      ].filter(Boolean).join(' ');

      // Day number — top-left, plain Inter
      const dayHeader = `<div class=\"cal-day-num-wrap\"><span class=\"cal-day-num\">${d}</span></div>`;

      // Event chips (max 4, then "+N more"), each with palette color
      const MAX_VISIBLE = 4;
      const visible = dayEvs.slice(0, MAX_VISIBLE);
      const extra   = dayEvs.length - MAX_VISIBLE;

      const items = visible.map((ev) => {
        const c = chipColor(ev.slug || ev.id || ev.name);
        return `<li class=\"cal-event-item\" style=\"background:${c.bg};border-left-color:${c.border}\">` +
          `<a href=\"${siteBaseUrl}events/${escHtml(ev.slug)}/\" class=\"cal-event-link\" title=\"${escHtml(ev.name)}\">${escHtml(ev.name)}</a>` +
          `</li>`;
      }).join('');

      const moreRow = extra > 0
        ? `<li class=\"cal-more\">+${extra} more</li>`
        : '';

      const list = (items || moreRow)
        ? `<ul class=\"cal-event-list\">${items}${moreRow}</ul>`
        : '';

      const dateStr  = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dateAttr = dayEvs.length > 0 ? ` data-date=\"${dateStr}\"` : '';
      html += `<div class=\"${classes}\"${dateAttr}>${dayHeader}${list}</div>`;
    }

    document.getElementById('calendar-cells').innerHTML = html;
  }

  // Delegated click: tap a day with events → home page filtered to that date
  document.getElementById('calendar-cells').addEventListener('click', (e) => {
    if (e.target.closest('.cal-event-link')) return; // event chip handles its own nav
    const cell = e.target.closest('.cal-cell[data-date]');
    if (!cell) return;
    window.location.href = `${siteBaseUrl}?date=${cell.dataset.date}`;
  });

  document.getElementById('prev-month').addEventListener('click', () => {
    month--;
    if (month < 0) { month = 11; year--; }
    renderCalendar();
  });

  document.getElementById('next-month').addEventListener('click', () => {
    month++;
    if (month > 11) { month = 0; year++; }
    renderCalendar();
  });

  renderCalendar();
})();</script>
